<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairstyle AI - Scan QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0a;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: #121212;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            max-width: 500px;
        }
        h1 {
            color: #d4af37;
            font-size: 28px;
            margin: 0 0 10px 0;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin: 0 0 30px 0;
        }
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            margin: 20px 0;
        }
        .link {
            color: #d4af37;
            font-size: 12px;
            word-break: break-all;
            margin: 20px 0;
            padding: 12px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 8px;
            font-family: monospace;
        }
        .instructions {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            line-height: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .step {
            margin: 12px 0;
        }
        .step-number {
            color: #d4af37;
            font-weight: bold;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Hairstyle AI</h1>
        <p class="subtitle">Scan to open demo app</p>
        
        <div id="qrcode"></div>
        
        <div class="link">
            exp://exp.host/@aayav/hairstyle-ai-consultant
        </div>
        
        <div class="instructions">
            <div class="step">
                <span class="step-number">1.</span>
                Download <strong>Expo Go</strong> app (App Store or Google Play)
            </div>
            <div class="step">
                <span class="step-number">2.</span>
                Open Expo Go and scan this QR code with your camera
            </div>
            <div class="step">
                <span class="step-number">3.</span>
                Or copy the link above and paste it in Expo Go
            </div>
        </div>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "exp://exp.host/@aayav/hairstyle-ai-consultant",
            width: 300,
            height: 300,
            colorDark: "#0a0a0a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
